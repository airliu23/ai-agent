<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐞 AI BUG 记录工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f6f8fa;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .toolbar {
            background: #24292e;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .toolbar h1 { font-size: 18px; font-weight: 600; }
        .toolbar-buttons { display: flex; gap: 8px; }
        .toolbar-buttons button {
            background: #0366d6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .output-panel {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
        }
        /* 消息气泡样式 */
        .message {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 85%;
            word-wrap: break-word;
        }
        .message.user { 
            background: #dbedff; 
            border-left: 4px solid #0366d6;
        }
        .message.ai { 
            background: #ffffff;
            border: 1px solid #e1e4e8;
            border-left: 4px solid #28a745;
        }
        .message.system { 
            background: #fff5b1;
            border-left: 4px solid #f9c513;
        }
        .input-panel {
            width: 400px;
            background: white;
            border-left: 1px solid #e1e4e8;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }
        .input-header { font-weight: 600; margin-bottom: 12px; color: #24292e; }
        #inputText {
            flex: 1;
            width: 100%;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 12px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            resize: none;
            margin-bottom: 12px;
        }
        #inputText:focus { outline: none; border-color: #0366d6; }
        .button-group { display: flex; gap: 8px; }
        .button-group button { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; }
        #sendBtn { background: #28a745; color: white; }
        #clearBtn { background: #e1e4e8; color: #24292e; }
        .status-bar {
            background: #f6f8fa;
            border-top: 1px solid #e1e4e8;
            padding: 6px 20px;
            font-size: 12px;
            color: #586069;
        }
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-ready { background: #28a745; }
    </style>
</head>
<body>
    <div class="toolbar">
        <h1>🐞 AI BUG 记录工具</h1>
        <div class="toolbar-buttons">
            <button onclick="app.newRecord()">🆕 新建</button>
            <button onclick="app.listBugs()">📋 列表</button>
            <button onclick="app.searchBugs()">🔍 搜索</button>
            <button onclick="app.clearOutput()">🗑️ 清空</button>
        </div>
    </div>
    <div class="main-container">
        <div class="output-panel" id="outputPanel"></div>
        <div class="input-panel">
            <div class="input-header">💬 输入</div>
            <textarea id="inputText" placeholder="请输入..."></textarea>
            <div class="button-group">
                <button id="sendBtn" onclick="app.send()">📤 发送</button>
                <button id="clearBtn" onclick="app.clearInput()">🧹 清空</button>
            </div>
        </div>
    </div>
    <div class="status-bar">
        <span class="status-indicator status-ready" id="statusIndicator"></span>
        <span id="statusText">就绪</span>
    </div>
    <script>
        const app = {
            outputContent: '',
            init() {
                const inputText = document.getElementById('inputText');
                if (inputText) {
                    inputText.addEventListener('keydown', (e) => {
                        if (e.ctrlKey && e.key === 'Enter') this.send();
                    });
                }
                console.log('GUI initialized');
            },
            send() {
                const inputText = document.getElementById('inputText');
                if (!inputText) return;
                const text = inputText.value.trim();
                if (!text) return;
                // 添加用户消息（带样式）
                this.addMessage('user', text);
                // 调用 Python API
                if (window.pywebview && window.pywebview.api) {
                    window.pywebview.api.receive_input(text);
                }
                inputText.value = '';
            },
            // 添加消息（带样式）
            addMessage(type, content) {
                const panel = document.getElementById('outputPanel');
                if (!panel) return;
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message ' + type;
                // 用户消息简单显示，AI 消息渲染 Markdown
                if (type === 'user') {
                    msgDiv.innerHTML = this.escapeHtml(content).replace(/\n/g, '<br>');
                } else {
                    msgDiv.innerHTML = this.renderMarkdown(content);
                }
                panel.appendChild(msgDiv);
                panel.scrollTop = panel.scrollHeight;
            },
            // HTML 转义
            escapeHtml(text) {
                return text.replace(/&/g, '&').replace(/</g, '<').replace(/>/g, '>');
            },
            // 简单的 Markdown 渲染
            renderMarkdown(text) {
                let html = this.escapeHtml(text);
                // 标题
                html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
                html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
                html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
                // 粗体
                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                // 斜体
                html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
                // 代码块
                html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
                // 行内代码
                html = html.replace(/`(.*?)`/g, '<code>$1</code>');
                // 列表
                html = html.replace(/^\- (.*$)/gim, '<li>$1</li>');
                html = html.replace(/^\* (.*$)/gim, '<li>$1</li>');
                // 换行
                html = html.replace(/\n/g, '<br>');
                return html;
            },
            appendOutput(content) {
                this.addMessage('ai', content);
            },
            clearOutput() { document.getElementById('outputPanel').innerHTML = ''; },
            clearInput() { document.getElementById('inputText').value = ''; },
            newRecord() { this.sendCommand('新建 BUG 记录'); },
            listBugs() { this.sendCommand('列出所有 BUG'); },
            searchBugs() {
                const keyword = prompt('请输入搜索关键词：');
                if (keyword) this.sendCommand('搜索 ' + keyword);
            },
            sendCommand(cmd) {
                if (window.pywebview && window.pywebview.api) {
                    window.pywebview.api.receive_input(cmd);
                }
            }
        };
        app.init();
    </script>
</body>
</html>

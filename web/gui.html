<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐞 AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 主内容区 */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* 左侧边栏 */
        .sidebar {
            width: 180px;
            background: white;
            border-right: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            padding: 12px;
            transition: width 0.3s ease;
            position: relative;
        }

        .sidebar-header {
            margin-bottom: 8px;
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            color: #000000;
            white-space: nowrap;
        }

        .sidebar-subtitle {
            font-size: 10px;
            color: #333333;
            margin-top: 2px;
            white-space: nowrap;
        }

        .sidebar.collapsed .sidebar-header {
            display: none;
        }

        .sidebar.collapsed {
            width: 48px;
            padding: 12px 8px;
        }

        .sidebar-toggle {
            position: absolute;
            right: -12px;
            top: 16px;
            width: 24px;
            height: 24px;
            background: white;
            border: 1px solid #e8e8e8;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #666;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .sidebar.collapsed .sidebar-toggle {
            transform: rotate(180deg);
        }

        .sidebar.collapsed .mode-title,
        .sidebar.collapsed .mode-btn span,
        .sidebar.collapsed .sidebar-action span {
            display: none;
        }

        .sidebar.collapsed .mode-btn,
        .sidebar.collapsed .sidebar-action {
            justify-content: center;
            padding: 10px;
        }

        .mode-section {
            margin-bottom: 20px;
        }

        .mode-title {
            font-size: 11px;
            color: #000000;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .mode-btn {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #e0e0e0;
            background: #ffffff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #000000;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .mode-btn:hover {
            background: #f0f0f0;
        }

        .mode-btn.active {
            background: #000000;
            border-color: #000000;
            color: #ffffff;
        }

        .sidebar-divider {
            height: 1px;
            background: #e8e8e8;
            margin: 16px 0;
        }

        .sidebar-action {
            width: 100%;
            padding: 6px 10px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: #000000;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .sidebar-action:hover {
            background: #e0e0e0;
        }

        /* 消息区域 */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .message {
            margin-bottom: 12px;
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.ai {
            align-items: flex-end;
        }

        .message.system {
            align-items: center;
        }

        .message.system .message-bubble {
            max-width: 60%;
        }

        .message-bubble {
            padding: 8px 12px;
            border-radius: 8px;
            line-height: 1.4;
            font-size: 15px;
            max-width: 100%;
            min-width: 100px;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            max-width: 80%;
            background: transparent;
            color: #333;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-bubble {
            max-width: 100%;
            align-self: flex-start;
            background: transparent;
            border: none;
            border-bottom-left-radius: 4px;
        }

        .message.system .message-bubble {
            background: transparent;
            border: none;
            color: #999;
            text-align: center;
            font-size: 13px;
        }

        .message-meta {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            padding: 0 4px;
        }

        .message.user .message-meta {
            text-align: right;
        }

        /* 输入区域 */
        .input-area {
            background: linear-gradient(to bottom, transparent, #ffffff 20%);
            padding: 16px 20px;
            margin-top: -40px;
            position: relative;
            z-index: 10;
        }

        .input-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            padding: 12px 16px;
            background: #f0f0f0;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #1677ff;
        }

        .input-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            padding: 12px 16px;
            background: #f0f0f0;
            transition: border-color 0.2s;
            display: flex;
            flex-direction: column;
        }

        .input-textarea {
            width: 100%;
            border: none;
            outline: none;
            resize: none;
            font-size: 15px;
            line-height: 1.5;
            min-height: 60px;
            max-height: 120px;
            font-family: inherit;
            background: #f0f0f0;
            padding: 8px;
            border-radius: 6px;
            flex: 6;
        }

        .input-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex: 4;
            min-height: 32px;
        }

        .toolbar-left {
            display: flex;
            gap: 8px;
        }

        .toolbar-btn {
            background: none;
            border: none;
            padding: 4px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            color: #000000;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .toolbar-btn:hover {
            background: #e0e0e0;
        }

        .send-btn {
            background: #1677ff;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: #4096ff;
        }

        .send-btn:disabled {
            background: #d9d9d9;
            cursor: not-allowed;
        }

        /* 底部状态栏 */
        .status-bar {
            background: #fafafa;
            border-top: 1px solid #e8e8e8;
            padding: 6px 20px;
            font-size: 12px;
            color: #999;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-ready { background: #52c41a; }
        .status-busy { background: #faad14; }
        .status-error { background: #ff4d4f; }

        /* Markdown 样式 */
        .message-bubble pre {
            background: #f6f8fa;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-bubble code {
            background: rgba(0,0,0,0.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "Consolas", monospace;
            font-size: 13px;
        }

        .message-bubble h1, .message-bubble h2, .message-bubble h3 {
            margin: 12px 0 8px 0;
        }

        .message-bubble ul, .message-bubble ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message-bubble li {
            margin: 4px 0;
        }

        .message-bubble strong {
            font-weight: 600;
        }

        /* 欢迎消息 */
        .welcome-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin: 20px auto;
            max-width: 600px;
            text-align: center;
            border: 1px solid #e8e8e8;
        }

        .welcome-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .welcome-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        .welcome-tips {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .welcome-tip {
            background: #f5f5f5;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- 主内容区 -->
    <div class="main-container">
        <!-- 左侧边栏 -->
        <div class="sidebar collapsed" id="sidebar">
            <div class="sidebar-toggle" onclick="app.toggleSidebar()">◀</div>
            
            <!-- 标题区域 -->
            <div class="sidebar-header">
                <div class="sidebar-title">🐞 AI Agent</div>
                <div class="sidebar-subtitle">智能管理助手</div>
            </div>

            <div class="sidebar-divider"></div>

            <div class="mode-section">
                <div class="mode-title">工作模式</div>
                <button class="mode-btn active" id="chatModeBtn" onclick="app.setMode('chat')">
                    💬 <span>对话模式</span>
                </button>
                <button class="mode-btn" id="bugModeBtn" onclick="app.setMode('bug')">
                    🐞 <span>BUG 模式</span>
                </button>
            </div>

            <div class="sidebar-divider"></div>

            <button class="sidebar-action" onclick="app.listBugs()">
                📋 <span>查看所有 BUG</span>
            </button>
            <button class="sidebar-action" onclick="app.searchBugs()">
                🔍 <span>搜索 BUG</span>
            </button>
            <button class="sidebar-action" onclick="app.clearChatContext()">
                🧠 <span>清空对话上下文</span>
            </button>

            <div class="sidebar-divider"></div>

            <button class="sidebar-action" onclick="app.clearOutput()">
                🗑️ <span>清空对话</span>
            </button>
            <button class="sidebar-action" onclick="app.newRecord()">
                🆕 <span>新建 BUG</span>
            </button>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container">
            <!-- 消息列表 -->
            <div class="messages-area" id="messagesArea">
                <div class="welcome-card" id="welcomeCard">
                    <div class="welcome-title">👋 欢迎使用 AI Agent</div>
                    <div class="welcome-desc">
                        我是你的智能助手，可以帮助你记录、管理和分析 BUG。<br>
                        支持自然语言对话，也可以直接上传文件进行分析。
                    </div>
                    <div class="welcome-tips">
                        <span class="welcome-tip">💬 自然语言对话</span>
                        <span class="welcome-tip">📎 文件上传分析</span>
                        <span class="welcome-tip">🔍 智能搜索</span>
                        <span class="welcome-tip">📝 Markdown 支持</span>
                    </div>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea 
                        class="input-textarea" 
                        id="inputText" 
                        placeholder="输入消息，按 Enter 发送，Shift+Enter 换行..."
                        rows="1"
                    ></textarea>
                    <div class="input-toolbar">
                        <div class="toolbar-left">
                            <button class="toolbar-btn" onclick="app.sendChatFile()" title="上传文件">
                                📎 上传文件
                            </button>
                            <button class="toolbar-btn" onclick="app.showShortcuts()" title="快捷指令">
                                ⚡ 快捷指令
                            </button>
                        </div>
                        <button class="send-btn" id="sendBtn" onclick="app.send()">
                            ➤
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部状态栏 -->
    <div class="status-bar">
        <span>
            <span class="status-indicator status-ready" id="statusIndicator"></span>
            <span id="statusText">就绪</span>
        </span>
        <span>Ctrl+Enter 发送 | Shift+Enter 换行</span>
    </div>

    <script>
        const app = {
            currentMode: "chat",

            async init() {
                const inputText = document.getElementById("inputText");
                if (inputText) {
                    // 自动调整高度
                    inputText.addEventListener("input", () => {
                        inputText.style.height = "auto";
                        inputText.style.height = Math.min(inputText.scrollHeight, 120) + "px";
                    });

                    // 键盘事件
                    inputText.addEventListener("keydown", (e) => {
                        if (e.key === "Enter" && !e.shiftKey) {
                            e.preventDefault();
                            this.send();
                        }
                    });
                }

                // 加载历史对话
                await this.loadChatHistory();

                console.log("GUI initialized");
            },

            async loadChatHistory() {
                // 等待 pywebview 准备好
                let retries = 0;
                while (!(window.pywebview && window.pywebview.api) && retries < 50) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    retries++;
                }

                if (!(window.pywebview && window.pywebview.api)) {
                    console.log("pywebview 未就绪，无法加载历史对话");
                    return;
                }

                try {
                    const result = await window.pywebview.api.get_chat_history();
                    if (result && result.success && result.history && result.history.length > 0) {
                        // 隐藏欢迎卡片
                        const welcomeCard = document.getElementById("welcomeCard");
                        if (welcomeCard) welcomeCard.style.display = "none";

                        // 显示历史对话
                        for (const msg of result.history) {
                            this.addMessage(msg.role, msg.content);
                        }
                        console.log(`已加载 ${result.history.length} 条历史消息`);
                    }
                } catch (error) {
                    console.log("加载历史对话失败:", error);
                }
            },

            setMode(mode) {
                this.currentMode = mode;

                const chatBtn = document.getElementById("chatModeBtn");
                const bugBtn = document.getElementById("bugModeBtn");
                const inputText = document.getElementById("inputText");

                if (chatBtn && bugBtn) {
                    chatBtn.classList.toggle("active", mode === "chat");
                    bugBtn.classList.toggle("active", mode === "bug");
                }

                if (inputText) {
                    inputText.placeholder = mode === "chat"
                        ? "输入消息，按 Enter 发送，Shift+Enter 换行..."
                        : "输入 BUG 描述、指令或搜索关键词...";
                }
            },

            toggleSidebar() {
                const sidebar = document.getElementById("sidebar");
                if (sidebar) {
                    sidebar.classList.toggle("collapsed");
                }
            },

            async send() {
                const inputText = document.getElementById("inputText");
                if (!inputText) return;

                const text = inputText.value.trim();
                if (!text) return;

                // 清空输入框
                inputText.value = "";
                inputText.style.height = "auto";

                // 添加用户消息（会自动隐藏欢迎卡片）
                this.addMessage("user", text);

                if (!(window.pywebview && window.pywebview.api)) {
                    this.addMessage("system", "当前未连接到 pywebview API。");
                    return;
                }

                if (this.currentMode === "chat") {
                    await this.sendChat(text);
                } else {
                    this.setStatus("busy", "BUG 工具处理中...");
                    try {
                        await window.pywebview.api.receive_input(text);
                        this.setStatus("ready", "就绪");
                    } catch (error) {
                        this.addMessage("system", "发送失败：" + error);
                        this.setStatus("error", "发送失败");
                    }
                }
            },

            async sendChat(text) {
                try {
                    this.setStatus("busy", "AI 思考中...");
                    const result = await window.pywebview.api.receive_chat(text);

                    if (result && result.success) {
                        this.addMessage("ai", result.reply);
                        this.setStatus("ready", "对话完成");
                    } else {
                        this.addMessage("system", "对话失败：" + ((result && result.error) || "未知错误"));
                        this.setStatus("error", "对话失败");
                    }
                } catch (error) {
                    this.addMessage("system", "对话失败：" + error);
                    this.setStatus("error", "对话失败");
                }
            },

            addMessage(type, content) {
                const messagesArea = document.getElementById("messagesArea");
                if (!messagesArea) return;

                // 隐藏欢迎卡片
                const welcomeCard = document.getElementById("welcomeCard");
                if (welcomeCard) welcomeCard.style.display = "none";

                const messageDiv = document.createElement("div");
                messageDiv.className = "message " + type;

                const bubbleDiv = document.createElement("div");
                bubbleDiv.className = "message-bubble";

                if (type === "user") {
                    bubbleDiv.innerHTML = this.escapeHtml(content).replace(/\n/g, "<br>");
                } else {
                    bubbleDiv.innerHTML = this.renderMarkdown(content);
                }

                messageDiv.appendChild(bubbleDiv);
                // 新消息追加到最后面（正常顺序）
                messagesArea.appendChild(messageDiv);
                // 用户消息滚动到底部，AI回复保持当前位置或滚动到消息顶部
                if (type === "user") {
                    messagesArea.scrollTop = messagesArea.scrollHeight;
                } else {
                    // AI回复：滚动到该消息的顶部位置
                    messageDiv.scrollIntoView({ behavior: "smooth", block: "start" });
                }
            },

            escapeHtml(text) {
                return String(text)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            },

            renderMarkdown(text) {
                let html = this.escapeHtml(String(text));
                html = html.replace(/^### (.*$)/gim, "<h3>$1</h3>");
                html = html.replace(/^## (.*$)/gim, "<h2>$1</h2>");
                html = html.replace(/^# (.*$)/gim, "<h1>$1</h1>");
                html = html.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
                html = html.replace(/\*(.*?)\*/g, "<em>$1</em>");
                html = html.replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>");
                html = html.replace(/`(.*?)`/g, "<code>$1</code>");
                html = html.replace(/^(\-|\*) (.*$)/gim, "<li>$2</li>");
                html = html.replace(/\n/g, "<br>");
                return html;
            },

            appendOutput(content) {
                this.addMessage("ai", content);
                this.setStatus("ready", "就绪");
            },

            clearOutput() {
                const messagesArea = document.getElementById("messagesArea");
                if (messagesArea) {
                    messagesArea.innerHTML = `
                        <div class="welcome-card" id="welcomeCard">
                            <div class="welcome-title">👋 欢迎使用 AI BUG 记录工具</div>
                            <div class="welcome-desc">
                                我是你的智能助手，可以帮助你记录、管理和分析 BUG。<br>
                                支持自然语言对话，也可以直接上传文件进行分析。
                            </div>
                            <div class="welcome-tips">
                                <span class="welcome-tip">💬 自然语言对话</span>
                                <span class="welcome-tip">📎 文件上传分析</span>
                                <span class="welcome-tip">🔍 智能搜索</span>
                                <span class="welcome-tip">📝 Markdown 支持</span>
                            </div>
                        </div>
                    `;
                }
            },

            async clearChatContext() {
                if (!(window.pywebview && window.pywebview.api)) {
                    this.addMessage("system", "当前未连接到 pywebview API。");
                    return;
                }

                try {
                    await window.pywebview.api.clear_chat();
                    // 清空对话框显示
                    this.clearOutput();
                    this.setStatus("ready", "对话上下文已清空");
                } catch (error) {
                    this.addMessage("system", "清空对话上下文失败：" + error);
                    this.setStatus("error", "清空失败");
                }
            },

            async sendChatFile() {
                if (!(window.pywebview && window.pywebview.api)) {
                    this.addMessage("system", "当前未连接到 pywebview API。");
                    return;
                }

                const inputText = document.getElementById("inputText");
                const question = inputText ? inputText.value.trim() : "";

                try {
                    this.setStatus("busy", "正在打开文件选择框...");

                    const result = await window.pywebview.api.receive_chat_file(question);

                    if (!result || !result.success) {
                        this.setStatus("ready", "就绪");
                        if (result && result.error && result.error !== "未选择文件") {
                            this.addMessage("system", "文件分析失败：" + result.error);
                        }
                        return;
                    }

                    // 隐藏欢迎卡片
                    const welcomeCard = document.getElementById("welcomeCard");
                    if (welcomeCard) welcomeCard.style.display = "none";

                    if (inputText) {
                        inputText.value = "";
                        inputText.style.height = "auto";
                    }

                    this.addMessage("user", `📎 ${result.file_name}${question ? " - " + question : ""}`);
                    this.addMessage("ai", result.reply);
                    this.setStatus("ready", "文件分析完成");
                } catch (error) {
                    this.addMessage("system", "文件分析失败：" + error);
                    this.setStatus("error", "文件分析失败");
                }
            },

            setStatus(status, text) {
                const indicator = document.getElementById("statusIndicator");
                const statusText = document.getElementById("statusText");

                if (indicator && statusText) {
                    indicator.className = "status-indicator status-" + status;
                    statusText.textContent = text;
                }

                // 禁用/启用发送按钮
                const sendBtn = document.getElementById("sendBtn");
                if (sendBtn) {
                    sendBtn.disabled = status === "busy";
                }
            },

            showShortcuts() {
                const shortcuts = `
常用快捷指令：
• 新建 BUG 记录
• 列出所有 BUG
• 搜索 [关键词]
• 查看 BUG [编号]

                `.trim();
